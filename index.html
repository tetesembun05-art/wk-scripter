<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Komedi - AI Video</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px; color: #333;
    }
    .container {
      max-width: 500px; margin: 0 auto; background: white;
      border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
    h2 { font-size: 18px; margin-bottom: 10px; color: #764ba2; }
    select, input, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; }
    .btn { background: #764ba2; color: white; border: none; font-weight: bold; cursor: pointer; }
    .btn-video { background: #f5576c; }
    .chat-bubble { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: white; padding: 10px; border-radius: 10px; }
    .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #764ba2; }
    video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
    .secret-box { background: #fff3cd; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ffeeba; }
  </style>
</head>
<body>

<div class="container">
  <h1 style="text-align:center; margin-bottom:20px;">🎭 Warung Komedi</h1>

  <div class="secret-box">
    <label style="font-size: 12px; font-weight: bold;">🔑 Masukkan API Token Hugging Face:</label>
    <input type="password" id="hfTokenInput" placeholder="hf_xxxxxxxxxxxxxxxxx" style="margin-top:5px;">
    <p style="font-size: 10px; color: #856404;">*Token hanya disimpan di browser anda, aman dari scan GitHub.</p>
  </div>

  <div class="card">
    <h2>🎬 Buat Cerita</h2>
    <select id="tema">
      <option value="bang_jali">Pamer Gadget (Bang Jali)</option>
      <option value="mang_udin">Nasib Sedih (Mang Udin)</option>
      <option value="asep">Filosofi (Asep)</option>
    </select>
    <button class="btn" onclick="generateScript()">🎯 Generate Script</button>
  </div>

  <div id="outputArea" style="display:none;">
    <div class="card">
      <h2>📜 Script</h2>
      <div id="scriptDisplay"></div>
      <button class="btn btn-video" id="btnVid" onclick="generateVideoAI()">🎬 Render Video AI</button>
      <div id="videoContainer"></div>
    </div>
  </div>
</div>

<script>
  let currentCharacter = 'bang_jali';
  const charData = {
    'bang_jali': 'https://raw.githubusercontent.com/tetesembun05-art/warungkomedi/main/Bang%20Jali.jpg',
    'mang_udin': 'https://raw.githubusercontent.com/tetesembun05-art/warungkomedi/main/Mang%20Udin%20(2).jpg',
    'asep': 'https://raw.githubusercontent.com/tetesembun05-art/warungkomedi/main/Asep.jpg'
  };

  function generateScript() {
    currentCharacter = document.getElementById('tema').value;
    const display = document.getElementById('scriptDisplay');
    const name = currentCharacter.replace('_', ' ').toUpperCase();
    
    display.innerHTML = `
      <div class="chat-bubble">
        <img src="${charData[currentCharacter]}" class="avatar">
        <div><strong>${name}:</strong><br>Woy, liat nih barang baru gue! Gak sanggup beli kan lo?</div>
      </div>
    `;
    document.getElementById('outputArea').style.display = 'block';
    document.getElementById('videoContainer').innerHTML = '';
  }

  async function generateVideoAI() {
    const token = document.getElementById('hfTokenInput').value;
    if(!token) return alert("Masukkan TOKEN dulu di kotak kuning atas!");

    const btn = document.getElementById('btnVid');
    btn.disabled = true;
    btn.innerText = "⏳ Sedang Merender...";

    try {
      const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt", {
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        method: "POST",
        body: JSON.stringify({ inputs: charData[currentCharacter] }),
      });

      if (!response.ok) throw new Error("Token Salah atau Server Sibuk");

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      
      document.getElementById('videoContainer').innerHTML = `<video controls autoplay loop><source src="${url}"></video>`;
    } catch (e) {
      alert("Error: " + e.message);
    } finally {
      btn.disabled = false;
      btn.innerText = "🎬 Render Video AI";
    }
  }
</script>
</body>
</html>
